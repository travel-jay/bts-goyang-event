<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Borahae Benefits for ARMY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=block" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<script>
var _lang = localStorage.getItem('thfa_lang') || '';
var _gateOk = sessionStorage.getItem('thfa_gate');
var _mapLang = (_lang === 'ko') ? 'ko' : 'en';
if (_lang && _gateOk) {
  document.write('<scr'+'ipt src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=gektkc7tyn&language='+_mapLang+'"><\/scr'+'ipt>');
}
</script>
<script src="https://navermaps.github.io/maps.js.ncp/docs/data/MarkerClustering.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins','Noto Sans KR',sans-serif;font-weight:400;background:#121212;color:#fff;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* ===== Gate Page ===== */
.gate{position:fixed;inset:0;z-index:9999;background:#121212;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s,visibility 0.5s}
.gate.hidden{opacity:0;visibility:hidden;pointer-events:none}
.gate-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.gate-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.35;animation:orbFloat 6s ease-in-out infinite alternate}
.gate-orb.orb1{width:300px;height:300px;background:radial-gradient(circle at 30% 30%,#D8B4FE,#A855F7);top:-80px;right:-60px;animation-delay:0s}
.gate-orb.orb2{width:250px;height:250px;background:radial-gradient(circle at 70% 70%,#A855F7,#7c3aed);bottom:-60px;left:-40px;animation-delay:-3s}
.gate-orb.orb3{width:150px;height:150px;background:radial-gradient(circle at 50% 50%,#D8B4FE,#A855F7);top:40%;left:50%;transform:translateX(-50%);animation-delay:-1.5s}
@keyframes orbFloat{0%{transform:translateY(0)}100%{transform:translateY(-20px)}}
.gate-content{position:relative;z-index:1;text-align:center;padding:0 24px;opacity:0;animation:gateFadeIn 0.6s ease 0.3s forwards}
@keyframes gateFadeIn{to{opacity:1}}
.gate-logo{font-family:'Bebas Neue','Montserrat',sans-serif;font-weight:400;font-size:3rem;letter-spacing:0.05em;margin-bottom:8px;line-height:1.05;text-transform:uppercase}
.gate-logo .highlight{background:linear-gradient(135deg,#D8B4FE 0%,#A855F7 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.gate-sub{font-size:0.85rem;color:rgba(255,255,255,0.45);font-weight:300;margin-bottom:36px}
.gate-date{margin-top:24px;font-size:0.8rem;color:rgba(255,255,255,0.35);font-weight:300;letter-spacing:0.05em}
.gate-buttons{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:300px;margin:0 auto}
.gate-btn{padding:13px 16px;border-radius:14px;border:1px solid rgba(168,85,247,0.25);background:rgba(255,255,255,0.04);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:#fff;font-size:0.88rem;font-family:'Poppins','Noto Sans KR',sans-serif;font-weight:500;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:8px}
.gate-btn:hover{background:rgba(168,85,247,0.15);border-color:rgba(168,85,247,0.5);transform:translateY(-2px);box-shadow:0 8px 24px rgba(168,85,247,0.2)}
.gate-btn:active{transform:translateY(0)}
.gate-btn .flag{font-size:1.2rem}

/* ===== Main Content ===== */
.main-content{display:none}

/* Header */
.header{background:rgba(18,18,18,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(168,85,247,0.15);color:#fff;padding:14px 20px;text-align:center;position:sticky;top:0;z-index:100}
.header h1{font-family:'Bebas Neue','Montserrat',sans-serif;font-weight:400;font-size:1.4rem;letter-spacing:0.04em;margin-bottom:2px;padding:0 80px;background:linear-gradient(135deg,#D8B4FE 0%,#A855F7 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .sub{font-size:0.78rem;opacity:0.7;font-weight:300}
.lang-wrap{position:absolute;right:14px;top:50%;transform:translateY(-50%)}
.lang-toggle{background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.3);color:#D8B4FE;padding:6px 12px;border-radius:14px;cursor:pointer;font-size:0.8rem;font-weight:500;transition:all 0.2s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.lang-toggle:hover{background:rgba(168,85,247,0.3);border-color:rgba(168,85,247,0.5)}
.lang-toggle .arrow{font-size:0.6rem;opacity:0.7;transition:transform 0.2s}
.lang-toggle.open .arrow{transform:rotate(180deg)}
.lang-menu{position:absolute;top:calc(100% + 6px);right:0;background:rgba(24,24,24,0.97);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(168,85,247,0.25);border-radius:14px;overflow:hidden;min-width:130px;box-shadow:0 8px 24px rgba(0,0,0,0.4);opacity:0;visibility:hidden;transform:translateY(-6px);transition:all 0.2s;z-index:200}
.lang-menu.open{opacity:1;visibility:visible;transform:translateY(0)}
.lang-menu button{display:flex;align-items:center;gap:8px;width:100%;padding:10px 14px;border:none;background:transparent;color:rgba(255,255,255,0.7);font-size:0.82rem;cursor:pointer;transition:background 0.15s;font-family:'Poppins','Noto Sans KR',sans-serif;text-align:left}
.lang-menu button:hover{background:rgba(168,85,247,0.15);color:#fff}
.lang-menu button.active{color:#D8B4FE;font-weight:700;background:rgba(168,85,247,0.1)}
.lang-menu button:not(:last-child){border-bottom:1px solid rgba(255,255,255,0.05)}

/* Guide */
.guide-section{background:rgba(255,255,255,0.03);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);margin:10px;border-radius:16px;overflow:hidden;border:1px solid rgba(168,85,247,0.12)}
.guide-toggle{width:100%;padding:13px 16px;border:none;background:transparent;color:#fff;text-align:left;font-size:0.88rem;font-weight:500;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-family:'Poppins','Noto Sans KR',sans-serif}
.guide-toggle:hover{background:rgba(168,85,247,0.06)}
.guide-toggle .arrow{transition:transform 0.3s;color:#A855F7}
.guide-toggle.open .arrow{transform:rotate(180deg)}
.guide-content{max-height:0;overflow:hidden;transition:max-height 0.3s ease}
.guide-content.open{max-height:500px}
.guide-content-inner{padding:0 16px 14px;font-size:0.8rem;line-height:1.7;color:rgba(255,255,255,0.6);font-weight:300}
.guide-content-inner ol{padding-left:18px}
.guide-content-inner li{margin-bottom:5px}

/* Mobile: fixed viewport layout */
.app-body{display:flex;flex-direction:column;height:calc(100vh - 66px);overflow:hidden}
.map-wrap{flex-shrink:0;order:1}
.guide-section{order:3;flex-shrink:0}
.controls{order:2;flex-shrink:0;background:#121212;padding-bottom:4px;border-bottom:1px solid rgba(255,255,255,0.04)}
.card-list{order:4;flex:1;overflow-y:auto;min-height:0}

/* Search */
.search-wrap{padding:8px 10px 0;position:relative}
.search-wrap input{width:100%;padding:10px 14px 10px 38px;border:1px solid rgba(168,85,247,0.2);border-radius:24px;font-size:0.85rem;outline:none;transition:all 0.2s;background:rgba(255,255,255,0.04);color:#fff;font-family:'Poppins','Noto Sans KR',sans-serif;font-weight:300}
.search-wrap input::placeholder{color:rgba(255,255,255,0.3)}
.search-wrap input:focus{border-color:rgba(168,85,247,0.5);background:rgba(255,255,255,0.06);box-shadow:0 0 0 3px rgba(168,85,247,0.1)}
.search-wrap .search-icon{position:absolute;left:22px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:rgba(255,255,255,0.35)}
.search-wrap .search-clear{position:absolute;right:22px;top:50%;transform:translateY(-50%);width:20px;height:20px;border:none;background:none;cursor:pointer;color:rgba(255,255,255,0.4);font-size:1.1rem;display:none}

/* Filters */
.filters{display:flex;gap:7px;padding:8px 10px 4px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;padding:7px 14px;border-radius:22px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);font-size:0.78rem;cursor:pointer;transition:all 0.25s;white-space:nowrap;color:rgba(255,255,255,0.6);font-family:'Poppins','Noto Sans KR',sans-serif;font-weight:400}
.filter-btn:hover{border-color:rgba(168,85,247,0.4);color:#D8B4FE;background:rgba(168,85,247,0.08)}
.filter-btn.active{background:linear-gradient(135deg,#A855F7,#7c3aed);color:#fff;border-color:transparent;box-shadow:0 2px 12px rgba(168,85,247,0.3)}
.filter-count{font-size:0.67rem;opacity:0.6;margin-left:3px}

/* Sort */
.sort-bar{display:flex;gap:6px;padding:0 10px 4px;align-items:center}
.sort-btn{padding:4px 11px;border-radius:12px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);font-size:0.72rem;cursor:pointer;transition:all 0.2s;color:rgba(255,255,255,0.45);font-family:'Poppins','Noto Sans KR',sans-serif}
.sort-btn:hover{border-color:rgba(168,85,247,0.3);color:#D8B4FE}
.sort-btn.active{background:rgba(168,85,247,0.15);color:#D8B4FE;border-color:rgba(168,85,247,0.3)}

/* Map */
.map-wrap{margin:6px 10px;border-radius:16px;overflow:hidden;border:1px solid rgba(168,85,247,0.15);height:28vh;min-height:180px;position:relative;z-index:50;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
#map{width:100%;height:100%}
.my-loc-btn{position:absolute;bottom:14px;left:14px;z-index:10;width:38px;height:38px;border-radius:50%;border:1px solid rgba(168,85,247,0.2);background:rgba(18,18,18,0.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:0 2px 8px rgba(0,0,0,0.4);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.my-loc-btn:hover{background:rgba(168,85,247,0.2);border-color:rgba(168,85,247,0.4)}
.my-loc-btn svg{width:20px;height:20px}
.my-loc-btn.loading{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* Cards */
.card-list{padding:6px 10px 40px}
.card{background:rgba(255,255,255,0.03);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-radius:16px;padding:16px;margin-bottom:10px;border:1px solid rgba(255,255,255,0.06);cursor:pointer;transition:all 0.25s;border-left:4px solid rgba(255,255,255,0.1)}
.card:hover{border-color:rgba(168,85,247,0.2);background:rgba(255,255,255,0.05);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.2)}
.card.highlight{border-color:rgba(168,85,247,0.3);background:rgba(168,85,247,0.08);box-shadow:0 4px 20px rgba(168,85,247,0.15);border-left-color:#A855F7}
.card.cat-food{border-left-color:#9333EA}
.card.cat-shopping{border-left-color:#7C3AED}
.card.cat-activity{border-left-color:#6D28D9}
.card.cat-beauty{border-left-color:#A855F7}
.card.cat-etc{border-left-color:#581C87}
.card .num{display:inline-block;background:rgba(168,85,247,0.15);color:#D8B4FE;font-size:0.68rem;padding:2px 8px;border-radius:10px;margin-bottom:6px;font-weight:500}
.card .name{font-family:'Montserrat','Noto Sans KR',sans-serif;font-weight:700;font-size:0.95rem;margin-bottom:3px;color:#fff}
.card .type{font-size:0.74rem;color:rgba(255,255,255,0.4);margin-bottom:5px;font-weight:300}
.card .addr{font-size:0.8rem;color:rgba(255,255,255,0.55);margin-bottom:5px;font-weight:300}
.card .distance{font-size:0.72rem;color:#60a5fa;margin-bottom:5px;font-weight:400}
.card .event-tag{font-size:0.73rem;color:#D8B4FE;background:rgba(168,85,247,0.12);padding:3px 10px;border-radius:10px;display:inline-block;margin-bottom:6px;border:1px solid rgba(168,85,247,0.15);font-weight:400}
.card .map-links{display:flex;gap:8px;margin-top:5px;flex-wrap:wrap}
.card .map-link{display:inline-block;font-size:0.74rem;color:#fff;background:linear-gradient(135deg,#A855F7,#7c3aed);padding:4px 12px;border-radius:10px;text-decoration:none;font-weight:500;transition:all 0.2s;box-shadow:0 2px 8px rgba(168,85,247,0.25)}
.card .map-link:hover{box-shadow:0 4px 14px rgba(168,85,247,0.4);transform:translateY(-1px)}
.card .naver-link{background:linear-gradient(135deg,#1EC800,#17a600);box-shadow:0 2px 8px rgba(30,200,0,0.25)}
.card .naver-link:hover{box-shadow:0 4px 14px rgba(30,200,0,0.4)}
.card .google-link{background:linear-gradient(135deg,#4285F4,#3367D6);box-shadow:0 2px 8px rgba(66,133,244,0.25)}
.card .google-link:hover{box-shadow:0 4px 14px rgba(66,133,244,0.4)}
.no-results{text-align:center;padding:40px 16px;color:rgba(255,255,255,0.35);font-size:0.9rem;font-weight:300}

/* Scroll to top */
.scroll-top{position:fixed;bottom:24px;right:16px;z-index:90;width:42px;height:42px;border-radius:50%;border:1px solid rgba(168,85,247,0.25);background:rgba(18,18,18,0.9);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:0 2px 12px rgba(0,0,0,0.4);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s;opacity:0;visibility:hidden;transform:translateY(10px)}
.scroll-top.show{opacity:1;visibility:visible;transform:translateY(0)}
.scroll-top:hover{background:rgba(168,85,247,0.25);border-color:rgba(168,85,247,0.5);box-shadow:0 4px 16px rgba(168,85,247,0.3)}
.scroll-top svg{width:20px;height:20px;stroke:#D8B4FE}

/* Footer */
.footer{text-align:center;padding:20px;font-size:0.7rem;color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.02);border-top:1px solid rgba(255,255,255,0.04);margin-top:10px;font-weight:300}

/* Desktop */
@media(min-width:768px){
  .gate-logo{font-size:5rem}
  .gate-sub{font-size:1rem}
  .gate-buttons{grid-template-columns:1fr 1fr;max-width:480px;justify-content:center}
  .lang-toggle{padding:7px 18px;font-size:0.85rem;border-radius:16px}
  /* 2-col: map(left) | guide+controls+cards(right) */
  .app-body{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto auto 1fr;grid-template-areas:"map guide" "map controls" "map cards";gap:0 10px;padding:10px;height:calc(100vh - 66px);overflow:hidden}
  .header h1{font-size:1.7rem;padding:0}
  .map-wrap{grid-area:map;margin:0;height:100%;min-height:unset;border-radius:16px;position:relative;order:unset}
  .guide-section{grid-area:guide;margin:0 0 6px;order:unset}
  .controls{grid-area:controls;position:static;background:transparent;border-bottom:none;padding-bottom:0;order:unset}
  .card-list{order:unset}
  .search-wrap{padding:0 0 6px}
  .filters{padding:0 0 4px}
  .sort-bar{padding:0 0 4px}
  .card-list{grid-area:cards;padding:4px 0 20px;overflow-y:auto;min-height:0}
  .card-list::-webkit-scrollbar{width:4px}
  .card-list::-webkit-scrollbar-track{background:transparent}
  .card-list::-webkit-scrollbar-thumb{background:rgba(168,85,247,0.3);border-radius:4px}
  .footer{display:none}
}
</style>
</head>
<body>

<!-- Gate Page -->
<div class="gate" id="gate">
  <div class="gate-bg">
    <div class="gate-orb orb1"></div>
    <div class="gate-orb orb2"></div>
    <div class="gate-orb orb3"></div>
  </div>
  <div class="gate-content">
    <div class="gate-logo">Borahae Benefits<br>for <span class="highlight">ARMY</span></div>
    <div class="gate-sub">BTS Goyang Concert Event Partner Store Guide</div>
    <div class="gate-buttons">
      <button class="gate-btn" onclick="enterSite('ko')"><span class="flag">&#x1F1F0;&#x1F1F7;</span> 한국어</button>
      <button class="gate-btn" onclick="enterSite('en')"><span class="flag">&#x1F1FA;&#x1F1F8;</span> English</button>
      <button class="gate-btn" onclick="enterSite('zh')"><span class="flag">&#x1F1E8;&#x1F1F3;</span> 中文</button>
      <button class="gate-btn" onclick="enterSite('ja')"><span class="flag">&#x1F1EF;&#x1F1F5;</span> 日本語</button>
    </div>
    <div class="gate-date">2026.04.09 ~ 11 | Goyang-si, Korea</div>
  </div>
</div>

<!-- Main Content -->
<div class="main-content" id="mainContent">

<div class="header">
  <div class="lang-wrap" id="langWrap">
    <button class="lang-toggle" onclick="toggleLangMenu()" id="langBtn">한국어 <span class="arrow">&#9660;</span></button>
    <div class="lang-menu" id="langMenu">
      <button onclick="selectLang('ko')" data-lang="ko">&#x1F1F0;&#x1F1F7; 한국어</button>
      <button onclick="selectLang('en')" data-lang="en">&#x1F1FA;&#x1F1F8; English</button>
      <button onclick="selectLang('zh')" data-lang="zh">&#x1F1E8;&#x1F1F3; 中文</button>
      <button onclick="selectLang('ja')" data-lang="ja">&#x1F1EF;&#x1F1F5; 日本語</button>
    </div>
  </div>
  <h1>Borahae Benefits for ARMY</h1>
  <div class="sub"
    data-ko="BTS 고양 콘서트 이벤트 참여 매장 안내"
    data-en="BTS Goyang Concert Event Partner Store Guide"
    data-zh="BTS高阳演唱会活动参与店铺指南"
    data-ja="BTS高陽コンサートイベント参加店舗ガイド"></div>
</div>

<div class="app-body">
  <div class="map-wrap">
    <div id="map"></div>
    <button class="my-loc-btn" id="myLocBtn" onclick="showMyLocation()" title="내 위치">
      <svg viewBox="0 0 24 24" fill="none" stroke="#D8B4FE" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M2 12h3m14 0h3"/><circle cx="12" cy="12" r="8"/></svg>
    </button>
  </div>

  <div class="guide-section">
    <button class="guide-toggle" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
      <span data-ko="이벤트 참여 방법" data-en="How to Participate" data-zh="活动参与方法" data-ja="イベント参加方法">이벤트 참여 방법</span>
      <span class="arrow">&#9660;</span>
    </button>
    <div class="guide-content">
      <div class="guide-content-inner">
        <ol>
          <li data-ko="아래 참여 매장을 방문하세요" data-en="Visit a participating store below" data-zh="请访问下方参与店铺" data-ja="下記の参加店舗を訪問してください">아래 참여 매장을 방문하세요</li>
          <li data-ko="매장에서 이벤트 혜택을 확인하세요" data-en="Check the event benefits at the store" data-zh="在店铺确认活动优惠" data-ja="店舗でイベント特典をご確認ください">매장에서 이벤트 혜택을 확인하세요</li>
          <li data-ko="혜택을 즐기고 고양시를 탐험하세요!" data-en="Enjoy the benefits and explore Goyang!" data-zh="享受优惠，探索高阳市！" data-ja="特典を楽しんで高陽市を探検しよう！">혜택을 즐기고 고양시를 탐험하세요!</li>
        </ol>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="searchInput"
        data-ko-placeholder="매장명 또는 주소 검색"
        data-en-placeholder="Search store name or address"
        data-zh-placeholder="搜索店铺名称或地址"
        data-ja-placeholder="店舗名または住所を検索" />
      <button class="search-clear" id="searchClear" onclick="clearSearch()">&times;</button>
    </div>
    <div class="filters" id="filters"></div>
    <div class="sort-bar" id="sortBar"></div>
  </div>

  <div class="card-list" id="cardList"></div>
</div>

<div class="footer">
  <span data-ko="고양시 BTS 콘서트 이벤트" data-en="Goyang City BTS Concert Event" data-zh="高阳市BTS演唱会活动" data-ja="高陽市BTSコンサートイベント">고양시 BTS 콘서트 이벤트</span> | Borahae Benefits for ARMY
</div>
