<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treasure Hunt for ARMY</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --food:#FF6B35;--shopping:#7B2FBE;--activity:#2196F3;--etc:#78909C;
  --bg:#F5F0FF;--card:#fff;--text:#1a1a2e;--sub:#666;--border:#e0d4f5;
  --purple:#7B2FBE;--purple-light:#F5F0FF;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
a{color:inherit;text-decoration:none}

/* Header */
.header{background:linear-gradient(135deg,#7B2FBE,#9B59B6);color:#fff;padding:16px 20px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:1.3rem;letter-spacing:-.5px}
.header h1 span{display:block;font-size:.75rem;font-weight:400;opacity:.85;margin-top:2px}
.lang-toggle{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:.85rem;font-weight:600;transition:background .2s}
.lang-toggle:hover{background:rgba(255,255,255,.35)}

/* Guide */
.guide{max-width:1200px;margin:12px auto;padding:0 12px}
.guide-box{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden}
.guide-header{padding:14px 18px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:.95rem}
.guide-header::after{content:'▼';font-size:.7rem;transition:transform .2s}
.guide-box.open .guide-header::after{transform:rotate(180deg)}
.guide-content{padding:0 18px;max-height:0;overflow:hidden;transition:max-height .3s,padding .3s}
.guide-box.open .guide-content{max-height:500px;padding:0 18px 16px}
.guide-content p{font-size:.88rem;color:var(--sub);margin-top:6px}
.guide-content ul{font-size:.88rem;color:var(--sub);margin:8px 0 0 18px}
.guide-content li{margin:4px 0}

/* Filters */
.filters{max-width:1200px;margin:10px auto;padding:0 12px;display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;padding:8px 18px;border-radius:20px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:.88rem;font-weight:500;transition:all .2s;white-space:nowrap}
.filter-btn.active{background:var(--purple);color:#fff;border-color:var(--purple)}
.filter-btn[data-cat="food"].active{background:var(--food);border-color:var(--food)}
.filter-btn[data-cat="shopping"].active{background:var(--shopping);border-color:var(--shopping)}
.filter-btn[data-cat="activity"].active{background:var(--activity);border-color:var(--activity)}
.filter-btn[data-cat="etc"].active{background:var(--etc);border-color:var(--etc)}
.filter-count{display:inline-block;background:rgba(255,255,255,.3);border-radius:10px;padding:0 6px;margin-left:4px;font-size:.75rem}

/* Main layout */
.main{max-width:1200px;margin:10px auto;padding:0 12px}
.map-wrap{border-radius:12px;overflow:hidden;height:50vh;min-height:300px;border:1px solid var(--border)}
#map{width:100%;height:100%}

/* Cards */
.cards{margin-top:12px;display:flex;flex-direction:column;gap:10px;padding-bottom:40px}
.card{background:var(--card);border-radius:12px;padding:16px;border:1px solid var(--border);cursor:pointer;transition:all .2s}
.card:hover,.card.highlight{border-color:var(--purple);box-shadow:0 2px 12px rgba(123,47,190,.15)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card-name{font-weight:700;font-size:1rem}
.card-badge{flex-shrink:0;padding:3px 10px;border-radius:12px;font-size:.72rem;font-weight:600;color:#fff}
.card-badge.food{background:var(--food)}
.card-badge.shopping{background:var(--shopping)}
.card-badge.activity{background:var(--activity)}
.card-badge.etc{background:var(--etc)}
.card-addr{font-size:.82rem;color:var(--sub);margin-top:4px}
.card-event{font-size:.85rem;margin-top:10px;padding-top:10px;border-top:1px solid #f0f0f0;white-space:pre-line}
.card-links{display:flex;gap:8px;margin-top:10px}
.card-link{font-size:.78rem;padding:5px 12px;border-radius:8px;background:var(--purple-light);color:var(--purple);font-weight:500;transition:background .2s}
.card-link:hover{background:#e8d5f5}

/* PC layout */
@media(min-width:768px){
  .main{display:grid;grid-template-columns:400px 1fr;gap:14px}
  .map-wrap{height:calc(100vh - 180px);position:sticky;top:80px;order:2}
  .cards{order:1;max-height:calc(100vh - 180px);overflow-y:auto}
  .cards::-webkit-scrollbar{width:6px}
  .cards::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
}

/* No results */
.no-results{text-align:center;padding:40px 20px;color:var(--sub);font-size:.95rem}
</style>
</head>

// ========== CATEGORY MAPPING ==========
const FOOD_KW = ['한식','카페','디저트','제과','식/음료','아시안','양식','일식','중식','피자','음식점업','한과','전통디저트','쌀국수','치킨'];
const SHOP_KW = ['대형마트','할인매장','백화점','복합쇼핑몰','패션','굿즈','소품','타월','생활용품'];
const ACT_KW = ['성형외과','뷰티','피부과','네일','아트','헤어','메이크업','스킨','바디','방탈출','보드게임','운동'];

function categorize(typeKo) {
  const t = (typeKo || '').split('\n')[0].trim();
  if (FOOD_KW.some(k => t.includes(k))) return 'food';
  if (SHOP_KW.some(k => t.includes(k))) return 'shopping';
  if (ACT_KW.some(k => t.includes(k))) return 'activity';
  return 'etc';
}

const DATA = RAW_DATA.map(d => ({ ...d, category: categorize(d.typeKo) }));

// ========== STATE ==========
let lang = navigator.language.startsWith('ko') ? 'ko' : 'en';
let activeFilter = 'all';
let map, clusterer, markers = [], infoWindow;

// ========== CATEGORY LABELS ==========
const CAT_LABELS = {
  all: { ko: '전체', en: 'All' },
  food: { ko: '음식', en: 'Food' },
  shopping: { ko: '쇼핑', en: 'Shopping' },
  activity: { ko: '액티비티', en: 'Activity' },
  etc: { ko: '기타', en: 'Others' }
};

const CAT_COLORS = { food: '#FF6B35', shopping: '#7B2FBE', activity: '#2196F3', etc: '#78909C' };

// ========== LANGUAGE ==========
function toggleLang() {
  lang = lang === 'ko' ? 'en' : 'ko';
  document.querySelector('.lang-toggle').textContent = lang === 'ko' ? 'EN' : 'KO';
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-ko]').forEach(el => {
    el.textContent = el.getAttribute('data-' + lang);
  });
  renderFilters();
  renderCards();
  updateMarkers();
}

// ========== FILTERS ==========
function renderFilters() {
  const counts = { all: DATA.length };
  DATA.forEach(d => { counts[d.category] = (counts[d.category] || 0) + 1; });
  const container = document.getElementById('filters');
  container.innerHTML = Object.keys(CAT_LABELS).map(cat => {
    const label = CAT_LABELS[cat][lang];
    const count = counts[cat] || 0;
    return `<button class="filter-btn${activeFilter === cat ? ' active' : ''}" data-cat="${cat}" onclick="setFilter('${cat}')">${label}<span class="filter-count">${count}</span></button>`;
  }).join('');
}

function setFilter(cat) {
  activeFilter = cat;
  renderFilters();
  renderCards();
  updateMarkers();
}

function filtered() {
  return activeFilter === 'all' ? DATA : DATA.filter(d => d.category === activeFilter);
}

// ========== CARDS ==========
function renderCards() {
  const items = filtered();
  const container = document.getElementById('cards');
  if (!items.length) {
    container.innerHTML = `<div class="no-results">${lang === 'ko' ? '해당 카테고리에 매장이 없습니다.' : 'No stores found in this category.'}</div>`;
    return;
  }
  container.innerHTML = items.map(d => {
    const name = lang === 'ko' ? d.nameKo : (d.nameEn || d.nameKo);
    const addr = lang === 'ko' ? d.addressKo : (d.addressEn || d.addressKo);
    const event = lang === 'ko' ? d.eventKo : (d.eventEn || d.eventKo);
    const type = lang === 'ko' ? d.typeKo : (d.typeEn || d.typeKo);
    const catLabel = CAT_LABELS[d.category][lang];
    const fullAddr = '고양시 ' + d.addressKo;
    const mapLinkKo = `https://map.naver.com/v5/search/${encodeURIComponent(fullAddr)}`;
    const mapLinkEn = `https://www.google.com/maps/search/${encodeURIComponent('Goyang-si ' + (d.addressEn || d.addressKo))}`;
    const mapLink = lang === 'ko' ? mapLinkKo : mapLinkEn;
    const mapLabel = lang === 'ko' ? '네이버지도' : 'Google Maps';
    return `<div class="card" id="card-${d.no}" onclick="focusMarker(${d.no})">
      <div class="card-top">
        <div class="card-name">${name}</div>
        <span class="card-badge ${d.category}">${catLabel}</span>
      </div>
      <div class="card-addr">${addr}</div>
      <div class="card-event">${(event || '').replace(/\n/g, '<br>')}</div>
      <div class="card-links">
        <a class="card-link" href="${mapLink}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${mapLabel}</a>
      </div>
    </div>`;
  }).join('');
}

// ========== MAP ==========
function initMap() {
  const center = new kakao.maps.LatLng(37.6584, 126.8320);
  map = new kakao.maps.Map(document.getElementById('map'), { center, level: 7 });
  clusterer = new kakao.maps.MarkerClusterer({
    map, averageCenter: true, minLevel: 5,
    calculator: [10, 30, 50],
    styles: [
      { width:'36px', height:'36px', background:'rgba(123,47,190,.7)', borderRadius:'18px', color:'#fff', textAlign:'center', lineHeight:'36px', fontSize:'14px', fontWeight:'bold' },
      { width:'42px', height:'42px', background:'rgba(123,47,190,.8)', borderRadius:'21px', color:'#fff', textAlign:'center', lineHeight:'42px', fontSize:'15px', fontWeight:'bold' },
      { width:'50px', height:'50px', background:'rgba(123,47,190,.9)', borderRadius:'25px', color:'#fff', textAlign:'center', lineHeight:'50px', fontSize:'16px', fontWeight:'bold' }
    ]
  });
  infoWindow = new kakao.maps.InfoWindow({ zIndex: 1 });
  updateMarkers();
  kakao.maps.event.addListener(map, 'click', () => infoWindow.close());
}

function createMarkerImage(category) {
  const color = CAT_COLORS[category] || CAT_COLORS.etc;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="40" viewBox="0 0 28 40"><path d="M14 0C6.3 0 0 6.3 0 14c0 10.5 14 26 14 26s14-15.5 14-26C28 6.3 21.7 0 14 0z" fill="${color}"/><circle cx="14" cy="14" r="6" fill="#fff"/></svg>`;
  return new kakao.maps.MarkerImage(
    'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg),
    new kakao.maps.Size(28, 40),
    { offset: new kakao.maps.Point(14, 40) }
  );
}

function updateMarkers() {
  markers.forEach(m => m.setMap(null));
  markers = [];
  clusterer.clear();
  const items = filtered().filter(d => d.lat && d.lng);
  items.forEach(d => {
    const pos = new kakao.maps.LatLng(d.lat, d.lng);
    const marker = new kakao.maps.Marker({ position: pos, image: createMarkerImage(d.category) });
    marker._no = d.no;
    kakao.maps.event.addListener(marker, 'click', () => {
      const name = lang === 'ko' ? d.nameKo : (d.nameEn || d.nameKo);
      const event = lang === 'ko' ? d.eventKo : (d.eventEn || d.eventKo);
      const shortEvent = (event || '').split('\n')[0];
      infoWindow.setContent(`<div style="padding:8px 12px;font-size:13px;max-width:250px;line-height:1.4"><strong>${name}</strong><br><span style="color:#666;font-size:12px">${shortEvent}</span></div>`);
      infoWindow.open(map, marker);
      map.panTo(pos);
      highlightCard(d.no);
    });
    markers.push(marker);
  });
  clusterer.addMarkers(markers);
}

function focusMarker(no) {
  const marker = markers.find(m => m._no === no);
  if (marker) {
    const pos = marker.getPosition();
    map.setLevel(3);
    map.panTo(pos);
    kakao.maps.event.trigger(marker, 'click');
  }
}

function highlightCard(no) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('highlight'));
  const card = document.getElementById('card-' + no);
  if (card) {
    card.classList.add('highlight');
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

// ========== INIT ==========
document.addEventListener('DOMContentLoaded', () => {
  // Set initial language text
  document.querySelector('.lang-toggle').textContent = lang === 'ko' ? 'EN' : 'KO';
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-ko]').forEach(el => {
    el.textContent = el.getAttribute('data-' + lang);
  });
  renderFilters();
  renderCards();
  // Init map after SDK loads
  if (typeof kakao !== 'undefined' && kakao.maps) {
    kakao.maps.load(initMap);
  }
});
</script>
