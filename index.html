<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Treasure Hunt for ARMY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins','Noto Sans KR',sans-serif;font-weight:400;background:#121212;color:#fff;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* ===== Gate Page ===== */
.gate{position:fixed;inset:0;z-index:9999;background:#121212;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.5s,visibility 0.5s}
.gate.hidden{opacity:0;visibility:hidden;pointer-events:none}
.gate-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.gate-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.35;animation:orbFloat 6s ease-in-out infinite alternate}
.gate-orb.orb1{width:300px;height:300px;background:radial-gradient(circle at 30% 30%,#D8B4FE,#A855F7);top:-80px;right:-60px;animation-delay:0s}
.gate-orb.orb2{width:250px;height:250px;background:radial-gradient(circle at 70% 70%,#A855F7,#7c3aed);bottom:-60px;left:-40px;animation-delay:-3s}
.gate-orb.orb3{width:150px;height:150px;background:radial-gradient(circle at 50% 50%,#D8B4FE,#A855F7);top:40%;left:50%;transform:translateX(-50%);animation-delay:-1.5s}
@keyframes orbFloat{0%{transform:translateY(0)}100%{transform:translateY(-20px)}}

.gate-content{position:relative;z-index:1;text-align:center;padding:0 24px}
.gate-logo{font-family:'Montserrat',sans-serif;font-weight:900;font-size:2.2rem;letter-spacing:-0.03em;margin-bottom:8px;line-height:1.15}
.gate-logo .highlight{background:linear-gradient(135deg,#D8B4FE 0%,#A855F7 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.gate-sub{font-size:0.85rem;color:rgba(255,255,255,0.45);font-weight:300;margin-bottom:48px}
.gate-buttons{display:flex;flex-direction:column;gap:12px;width:100%;max-width:280px;margin:0 auto}
.gate-btn{padding:14px 24px;border-radius:16px;border:1px solid rgba(168,85,247,0.25);background:rgba(255,255,255,0.04);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:#fff;font-size:0.95rem;font-family:'Poppins','Noto Sans KR',sans-serif;font-weight:500;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:10px}
.gate-btn:hover{background:rgba(168,85,247,0.15);border-color:rgba(168,85,247,0.5);transform:translateY(-2px);box-shadow:0 8px 24px rgba(168,85,247,0.2)}
.gate-btn:active{transform:translateY(0)}
.gate-btn .flag{font-size:1.3rem}
.gate-divider{display:flex;align-items:center;gap:12px;margin:4px 0;color:rgba(255,255,255,0.2);font-size:0.75rem;font-weight:300}
.gate-divider::before,.gate-divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.08)}

/* ===== Main Content (hidden until gate pass) ===== */
.main-content{display:none}
.main-content.visible{display:block}

/* Header */
.header{background:rgba(18,18,18,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(168,85,247,0.15);color:#fff;padding:16px 20px;text-align:center;position:sticky;top:0;z-index:100}
.header h1{font-family:'Montserrat',sans-serif;font-weight:900;font-size:1.5rem;letter-spacing:-0.02em;margin-bottom:2px;background:linear-gradient(135deg,#D8B4FE 0%,#A855F7 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .sub{font-size:0.78rem;opacity:0.7;font-weight:300}
.lang-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.3);color:#D8B4FE;padding:5px 12px;border-radius:14px;cursor:pointer;font-size:0.72rem;font-weight:500;transition:all 0.2s}
.lang-toggle:hover{background:rgba(168,85,247,0.3);border-color:rgba(168,85,247,0.5)}

/* Guide */
.guide-section{background:rgba(255,255,255,0.03);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);margin:10px;border-radius:16px;overflow:hidden;border:1px solid rgba(168,85,247,0.12)}
.guide-toggle{width:100%;padding:13px 16px;border:none;background:transparent;color:#fff;text-align:left;font-size:0.88rem;font-weight:500;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-family:'Poppins','Noto Sans KR',sans-serif}
.guide-toggle:hover{background:rgba(168,85,247,0.06)}
.guide-toggle .arrow{transition:transform 0.3s;color:#A855F7}
.guide-toggle.open .arrow{transform:rotate(180deg)}
.guide-content{max-height:0;overflow:hidden;transition:max-height 0.3s ease}
.guide-content.open{max-height:500px}
.guide-content-inner{padding:0 16px 14px;font-size:0.8rem;line-height:1.7;color:rgba(255,255,255,0.6);font-weight:300}
.guide-content-inner ol{padding-left:18px}
.guide-content-inner li{margin-bottom:5px}

/* Search */
.search-wrap{padding:10px 10px 0;position:relative}
.search-wrap input{width:100%;padding:10px 14px 10px 38px;border:1px solid rgba(168,85,247,0.2);border-radius:24px;font-size:0.85rem;outline:none;transition:all 0.2s;background:rgba(255,255,255,0.04);color:#fff;font-family:'Poppins','Noto Sans KR',sans-serif;font-weight:300}
.search-wrap input::placeholder{color:rgba(255,255,255,0.3)}
.search-wrap input:focus{border-color:rgba(168,85,247,0.5);background:rgba(255,255,255,0.06);box-shadow:0 0 0 3px rgba(168,85,247,0.1)}
.search-wrap .search-icon{position:absolute;left:22px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:rgba(255,255,255,0.35)}
.search-wrap .search-clear{position:absolute;right:22px;top:50%;transform:translateY(-50%);width:20px;height:20px;border:none;background:none;cursor:pointer;color:rgba(255,255,255,0.4);font-size:1.1rem;display:none}

/* Filters */
.filters{display:flex;gap:7px;padding:10px 10px 5px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;padding:7px 16px;border-radius:22px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);font-size:0.8rem;cursor:pointer;transition:all 0.25s;white-space:nowrap;color:rgba(255,255,255,0.6);font-family:'Poppins','Noto Sans KR',sans-serif;font-weight:400}
.filter-btn:hover{border-color:rgba(168,85,247,0.4);color:#D8B4FE;background:rgba(168,85,247,0.08)}
.filter-btn.active{background:linear-gradient(135deg,#A855F7,#7c3aed);color:#fff;border-color:transparent;box-shadow:0 2px 12px rgba(168,85,247,0.3)}
.filter-count{font-size:0.68rem;opacity:0.6;margin-left:3px}

/* Sort */
.sort-bar{display:flex;gap:6px;padding:0 10px 6px;align-items:center}
.sort-btn{padding:4px 11px;border-radius:12px;border:1px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);font-size:0.72rem;cursor:pointer;transition:all 0.2s;color:rgba(255,255,255,0.45);font-family:'Poppins','Noto Sans KR',sans-serif}
.sort-btn:hover{border-color:rgba(168,85,247,0.3);color:#D8B4FE}
.sort-btn.active{background:rgba(168,85,247,0.15);color:#D8B4FE;border-color:rgba(168,85,247,0.3)}

/* Map */
.map-wrap{margin:10px;border-radius:16px;overflow:hidden;border:1px solid rgba(168,85,247,0.15);height:45vh;min-height:280px;position:sticky;top:60px;z-index:50;box-shadow:0 4px 20px rgba(0,0,0,0.3);transition:height 0.3s ease,min-height 0.3s ease,border-radius 0.3s ease}
.map-wrap.collapsed{height:22vh;min-height:140px;border-radius:0 0 16px 16px;margin-top:0}
#map{width:100%;height:100%}
.my-loc-btn{position:absolute;bottom:14px;left:14px;z-index:10;width:38px;height:38px;border-radius:50%;border:1px solid rgba(168,85,247,0.2);background:rgba(18,18,18,0.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:0 2px 8px rgba(0,0,0,0.4);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.my-loc-btn:hover{background:rgba(168,85,247,0.2);border-color:rgba(168,85,247,0.4)}
.my-loc-btn svg{width:20px;height:20px}
.my-loc-btn.loading{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* Cards */
.card-list{padding:6px 10px 80px}
.card{background:rgba(255,255,255,0.03);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-radius:16px;padding:16px;margin-bottom:10px;border:1px solid rgba(255,255,255,0.06);cursor:pointer;transition:all 0.25s;border-left:4px solid rgba(255,255,255,0.1)}
.card:hover{border-color:rgba(168,85,247,0.2);background:rgba(255,255,255,0.05);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.2)}
.card.highlight{border-color:rgba(168,85,247,0.3);background:rgba(168,85,247,0.08);box-shadow:0 4px 20px rgba(168,85,247,0.15);border-left-color:#A855F7}
.card.cat-food{border-left-color:#ff9800}
.card.cat-shopping{border-left-color:#D8B4FE}
.card.cat-activity{border-left-color:#60a5fa}
.card.cat-etc{border-left-color:rgba(255,255,255,0.2)}
.card .num{display:inline-block;background:rgba(168,85,247,0.15);color:#D8B4FE;font-size:0.68rem;padding:2px 8px;border-radius:10px;margin-bottom:6px;font-weight:500}
.card .name{font-family:'Montserrat','Noto Sans KR',sans-serif;font-weight:700;font-size:0.95rem;margin-bottom:3px;color:#fff}
.card .type{font-size:0.74rem;color:rgba(255,255,255,0.4);margin-bottom:5px;font-weight:300}
.card .addr{font-size:0.8rem;color:rgba(255,255,255,0.55);margin-bottom:5px;font-weight:300}
.card .distance{font-size:0.72rem;color:#60a5fa;margin-bottom:5px;font-weight:400}
.card .event-tag{font-size:0.73rem;color:#D8B4FE;background:rgba(168,85,247,0.12);padding:3px 10px;border-radius:10px;display:inline-block;margin-bottom:6px;border:1px solid rgba(168,85,247,0.15);font-weight:400}
.card .map-link{display:inline-block;font-size:0.74rem;color:#fff;background:linear-gradient(135deg,#A855F7,#7c3aed);padding:4px 12px;border-radius:10px;text-decoration:none;margin-top:5px;font-weight:500;transition:all 0.2s;box-shadow:0 2px 8px rgba(168,85,247,0.25)}
.card .map-link:hover{box-shadow:0 4px 14px rgba(168,85,247,0.4);transform:translateY(-1px)}

.no-results{text-align:center;padding:40px 16px;color:rgba(255,255,255,0.35);font-size:0.9rem;font-weight:300}

/* Footer */
.footer{text-align:center;padding:20px;font-size:0.7rem;color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.02);border-top:1px solid rgba(255,255,255,0.04);margin-top:10px;font-weight:300}

/* Scroll to top */
.scroll-top{position:fixed;bottom:24px;right:16px;z-index:90;width:42px;height:42px;border-radius:50%;border:1px solid rgba(168,85,247,0.25);background:rgba(18,18,18,0.9);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:0 2px 12px rgba(0,0,0,0.4);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s;opacity:0;visibility:hidden;transform:translateY(10px)}
.scroll-top.show{opacity:1;visibility:visible;transform:translateY(0)}
.scroll-top:hover{background:rgba(168,85,247,0.25);border-color:rgba(168,85,247,0.5);box-shadow:0 4px 16px rgba(168,85,247,0.3)}
.scroll-top svg{width:20px;height:20px;stroke:#D8B4FE}

/* Desktop */
@media(min-width:768px){
  .gate-logo{font-size:3.2rem}
  .gate-sub{font-size:1rem}
  .gate-buttons{flex-direction:row;max-width:420px}
  .gate-btn{padding:16px 32px}
  .gate-divider{display:none}
  .content-wrap{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px}
  .map-wrap{margin:0;height:calc(100vh - 200px);position:sticky;top:140px;transition:none}
  .map-wrap.collapsed{height:calc(100vh - 200px);min-height:unset;border-radius:16px;margin-top:0}
  .card-list{padding:0 0 40px;max-height:calc(100vh - 200px);overflow-y:auto}
  .card-list::-webkit-scrollbar{width:4px}
  .card-list::-webkit-scrollbar-track{background:transparent}
  .card-list::-webkit-scrollbar-thumb{background:rgba(168,85,247,0.3);border-radius:4px}
  .filters{padding:10px}
  .search-wrap{padding:10px 10px 0}
  .lang-toggle{padding:7px 18px;font-size:0.85rem;border-radius:16px}
}
</style>
</head>
<body>

<!-- Gate Page -->
<div class="gate" id="gate">

<div class="guide-section">

      </ol>
    </div>
  </div>
</div>

<div class="search-wrap">
  <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
  <input type="text" id="searchInput" data-ko-placeholder="매장명 또는 주소 검색" data-en-placeholder="Search store name or address" />
  <button class="search-clear" id="searchClear" onclick="clearSearch()">&times;</button>
</div>

<div class="filters" id="filters"></div>
<div class="sort-bar" id="sortBar"></div>

<div class="content-wrap">
  <div class="map-wrap">
    <div id="map"></div>
    <button class="my-loc-btn" id="myLocBtn" onclick="showMyLocation()" title="내 위치">
      <svg viewBox="0 0 24 24" fill="none" stroke="#D8B4FE" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M2 12h3m14 0h3"/><circle cx="12" cy="12" r="8"/></svg>
    </button>
  </div>
  <div class="card-list" id="cardList"></div>
</div>

<div class="footer">
  <span data-ko="고양시 BTS 콘서트 이벤트" data-en="Goyang City BTS Concert Event">고양시 BTS 콘서트 이벤트</span> | Treasure Hunt for ARMY
</div>

</div><!-- /main-content -->

<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">
  <svg viewBox="0 0 24 24" fill="none" stroke="#D8B4FE" stroke-width="2.5" stroke-linecap="round"><path d="M18 15l-6-6-6 6"/></svg>
</button>

/* ---- Distance ---- */
function haversine(lat1, lng1, lat2, lng2) {
  var R = 6371;
  var dLat = (lat2 - lat1) * Math.PI / 180;
  var dLng = (lng2 - lng1) * Math.PI / 180;
  var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
    Math.sin(dLng/2) * Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function calcDistances() {
  if (myLat === null) return;
  DATA.forEach(function(d) {
    if (d.lat && d.lng) d._dist = haversine(myLat, myLng, d.lat, d.lng);
  });
}

function formatDist(km) {
  if (km === null || km === undefined) return '';
  if (km < 1) return Math.round(km * 1000) + 'm';
  return km.toFixed(1) + 'km';
}

}

}

/* ---- Filters ---- */
function catCount(cat) {
  if (cat === 'all') return DATA.length;
  return DATA.filter(function(d) { return d.category === cat; }).length;
}

function renderFilters() {
  var wrap = document.getElementById('filters');
  wrap.innerHTML = '';
  for (var key in CAT_META) {
    var meta = CAT_META[key];
    var btn = document.createElement('button');
    btn.className = 'filter-btn' + (currentFilter === key ? ' active' : '');
    btn.innerHTML = meta[currentLang] + '<span class="filter-count">(' + catCount(key) + ')</span>';
    btn.setAttribute('data-cat', key);
    btn.onclick = function() { setFilter(this.getAttribute('data-cat')); };
    wrap.appendChild(btn);
  }
}

function setFilter(f) {
  currentFilter = f;
  renderFilters();
  renderCards();
  updateMarkers();
}

function filtered() {
  var list = DATA;
  if (currentFilter !== 'all') {
    list = list.filter(function(d) { return d.category === currentFilter; });
  }
  if (searchQuery) {
    list = list.filter(function(d) {
      var haystack = (d.nameKo + ' ' + (d.nameEn||'') + ' ' + d.addressKo + ' ' + (d.addressEn||'')).toLowerCase();
      return haystack.indexOf(searchQuery) !== -1;
    });
  }
  if (sortMode === 'distance' && myLat !== null) {
    list = list.slice().sort(function(a, b) { return (a._dist||9999) - (b._dist||9999); });
  }
  return list;
}

function getMapLink(d) {
  if (currentLang === 'ko') {
    return 'https://map.naver.com/v5/search/' + encodeURIComponent(d.nameKo + ' ' + d.addressKo);

}

  var list = filtered();
  if (list.length === 0) {
    wrap.innerHTML = '<div class="no-results">' + (currentLang === 'ko' ? '검색 결과가 없습니다' : 'No results found') + '</div>';
    return;
  }
  list.forEach(function(d) {
    var card = document.createElement('div');
    card.className = 'card cat-' + d.category;
    card.id = 'card-' + d.no;
    var name = currentLang === 'ko' ? d.nameKo : (d.nameEn || d.nameKo);
    var type = currentLang === 'ko' ? d.typeKo : (d.typeEn || d.typeKo);
    var addr = currentLang === 'ko' ? d.addressKo : (d.addressEn || d.addressKo);
    var evt = currentLang === 'ko' ? d.eventKo : (d.eventEn || d.eventKo);
    var mapLabel = currentLang === 'ko' ? '길찾기' : 'Directions';
    var distHtml = d._dist !== null ? '<div class="distance">' + formatDist(d._dist) + '</div>' : '';
    card.innerHTML = '<span class="num">' + d.no + '</span>' +
      '<div class="name">' + name + '</div>' +
      '<div class="type">' + type + ' | ' + CAT_META[d.category][currentLang] + '</div>' +
      '<div class="addr">' + addr + '</div>' +
      distHtml +
      (evt ? '<div class="event-tag">' + evt + '</div>' : '') +
      '<a class="map-link" href="' + getMapLink(d) + '" target="_blank" rel="noopener">' + mapLabel + '</a>';
    card.onclick = function(e) { if (e.target.tagName !== 'A') focusMarker(d.no); };
    wrap.appendChild(card);
  });
}

/* ---- Map & Markers ---- */
function markerIconSvg(color) {
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="40" viewBox="0 0 28 40">' +
    '<path d="M14 0C6.3 0 0 6.3 0 14c0 10.5 14 26 14 26s14-15.5 14-26C28 6.3 21.7 0 14 0z" fill="' + color + '"/>' +
    '<circle cx="14" cy="14" r="6" fill="white"/></svg>'
  );
}

function markerIconSvgHighlight(color) {
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" width="36" height="50" viewBox="0 0 28 40">' +
    '<path d="M14 0C6.3 0 0 6.3 0 14c0 10.5 14 26 14 26s14-15.5 14-26C28 6.3 21.7 0 14 0z" fill="' + color + '" stroke="#fff" stroke-width="2"/>' +
    '<circle cx="14" cy="14" r="6" fill="white"/></svg>'
  );
}

var highlightedMarkerNo = null;

function updateMarkers() {
  if (!map) return;
  if (clusterer) clusterer.setMap(null);
  markers.forEach(function(m) { m.setMap(null); });
  markers = [];
  var list = filtered();
  list.forEach(function(d) {
    if (!d.lat || !d.lng) return;
    var color = CAT_META[d.category] ? CAT_META[d.category].color : '#9e9e9e';
    var marker = new naver.maps.Marker({
      position: new naver.maps.LatLng(d.lat, d.lng),
      icon: {
        url: markerIconSvg(color),
        size: new naver.maps.Size(28, 40),
        anchor: new naver.maps.Point(14, 40)
      },
      title: d.nameKo
    });
    marker._no = d.no;
    marker._color = color;
    naver.maps.Event.addListener(marker, 'click', function() {
      focusMarker(d.no);
    });
    markers.push(marker);
  });

  if (typeof MarkerClustering !== 'undefined') {
    try {
      clusterer = new MarkerClustering({
        minClusterSize: 2,
        maxZoom: 16,
        map: map,
        markers: markers,
        disableClickZoom: false,
        gridSize: 120,
        icons: [htmlClusterIcon(30), htmlClusterIcon(40), htmlClusterIcon(50)],
        indexGenerator: [10, 50, 100],
        stylingFunction: function(clusterMarker, count) {
          var el = clusterMarker.getElement();
          if (el) {
            var span = el.querySelector('span');
            if (span) span.textContent = count;
          }
        }
      });
    } catch(e) {
      markers.forEach(function(m) { m.setMap(map); });
    }
  } else {
    markers.forEach(function(m) { m.setMap(map); });
  }
}

function htmlClusterIcon(size) {
  return {
    content: '<div style="width:'+size+'px;height:'+size+'px;line-height:'+size+'px;border-radius:50%;background:rgba(123,47,247,0.75);color:#fff;text-align:center;font-size:13px;font-weight:700;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.3)"><span></span></div>',
    size: new naver.maps.Size(size, size),
    anchor: new naver.maps.Point(size/2, size/2)
  };
}

function focusMarker(no) {
  var d = DATA.find(function(x) { return x.no === no; });
  if (!d || !d.lat || !d.lng) return;
  var pos = new naver.maps.LatLng(d.lat, d.lng);
  map.setCenter(pos);
  map.setZoom(15);
  var name = currentLang === 'ko' ? d.nameKo : (d.nameEn || d.nameKo);
  if (infowindow) infowindow.close();
  infowindow = new naver.maps.InfoWindow({
    content: '<div style="padding:8px 12px;font-size:13px;white-space:nowrap">' + name + '</div>',
    borderWidth: 1, borderColor: '#ddd', backgroundColor: '#fff'
  });
  var m = markers.find(function(x) { return x._no === no; });
  if (m) {
    infowindow.open(map, m);
    highlightMarker(m);
  }
  highlightCard(no);
}

function highlightMarker(targetMarker) {
  if (highlightedMarkerNo !== null) {
    var prev = markers.find(function(x) { return x._no === highlightedMarkerNo; });
    if (prev) {
      prev.setIcon({
        url: markerIconSvg(prev._color),
        size: new naver.maps.Size(28, 40),
        anchor: new naver.maps.Point(14, 40)
      });
      prev.setZIndex(0);
    }
  }
  targetMarker.setIcon({
    url: markerIconSvgHighlight(targetMarker._color),
    size: new naver.maps.Size(36, 50),
    anchor: new naver.maps.Point(18, 50)
  });
  targetMarker.setZIndex(100);
  highlightedMarkerNo = targetMarker._no;
}

function highlightCard(no) {
  document.querySelectorAll('.card.highlight').forEach(function(c) { c.classList.remove('highlight'); });
  var card = document.getElementById('card-' + no);
  if (card) {
    card.classList.add('highlight');
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

/* ---- GPS ---- */
function showMyLocation() {
  if (!navigator.geolocation) {
    alert(currentLang === 'ko' ? '이 브라우저에서 위치 서비스를 지원하지 않습니다.' : 'Geolocation is not supported by this browser.');
    return;
  }
  var btn = document.getElementById('myLocBtn');
  btn.classList.add('loading');
  navigator.geolocation.getCurrentPosition(function(pos) {
    btn.classList.remove('loading');
    myLat = pos.coords.latitude;
    myLng = pos.coords.longitude;
    var position = new naver.maps.LatLng(myLat, myLng);
    if (myLocMarker) myLocMarker.setMap(null);
    myLocMarker = new naver.maps.Marker({
      position: position,
      map: map,
      icon: {
        content: '<div style="width:16px;height:16px;background:#4285f4;border:3px solid #fff;border-radius:50%;box-shadow:0 0 6px rgba(66,133,244,0.6)"></div>',
        anchor: new naver.maps.Point(8, 8)
      },
      zIndex: 200
    });
    map.setCenter(position);
    map.setZoom(14);
    calcDistances();
    renderSortBar();
    renderCards();
  }, function() {
    btn.classList.remove('loading');
    alert(currentLang === 'ko' ? '위치를 가져올 수 없습니다. 위치 권한을 확인하세요.' : 'Unable to get your location. Please check location permissions.');
  }, { enableHighAccuracy: true, timeout: 10000 });
}

/* ---- Map Init ---- */
function initMap() {
  var container = document.getElementById('map');
  container.innerHTML = '';
  map = new naver.maps.Map(container, {
    center: new naver.maps.LatLng(37.6565, 126.832),
    zoom: 12,
    zoomControl: true,
    zoomControlOptions: { position: naver.maps.Position.TOP_RIGHT }
  });
  updateMarkers();
}

/* ---- Init ---- */
document.addEventListener('DOMContentLoaded', function() {
  var gatePassed = sessionStorage.getItem('thfa_gate');
  if (!currentLang || !gatePassed) {
    document.getElementById('gate').style.display = '';
    document.getElementById('mainContent').classList.remove('visible');
    return;
  }
  document.getElementById('gate').classList.add('hidden');
  document.getElementById('mainContent').classList.add('visible');

  document.getElementById('langBtn').textContent = currentLang === 'ko' ? 'EN' : 'KO';
  var searchInput = document.getElementById('searchInput');
  searchInput.placeholder = currentLang === 'ko' ? searchInput.getAttribute('data-ko-placeholder') : searchInput.getAttribute('data-en-placeholder');
  if (currentLang === 'en') {
    document.querySelectorAll('[data-ko]').forEach(function(el) {
      el.textContent = el.getAttribute('data-en');
    });
  }
  var debounceTimer;
  searchInput.addEventListener('input', function() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(onSearch, 200);
  });
  renderFilters();
  renderSortBar();
  renderCards();
  initMap();

  /* ---- Scroll listeners ---- */
  var mapWrap = document.querySelector('.map-wrap');
  var cardList = document.querySelector('.card-list');
  var scrollBtn = document.getElementById('scrollTop');
  window.addEventListener('scroll', function() {
    /* Scroll-to-top button */
    if (scrollBtn) {
      if (window.scrollY > 400) { scrollBtn.classList.add('show'); }
      else { scrollBtn.classList.remove('show'); }
    }
    /* Mobile: collapse map */
    if (mapWrap && cardList && window.innerWidth < 768) {
      var rect = cardList.getBoundingClientRect();
      var wasCollapsed = mapWrap.classList.contains('collapsed');
      if (rect.top < 300) {
        mapWrap.classList.add('collapsed');
      } else {
        mapWrap.classList.remove('collapsed');
      }
      if (wasCollapsed !== mapWrap.classList.contains('collapsed') && map) {
        setTimeout(function() { map.autoResize(); }, 350);
      }
    }
  }, { passive: true });
});

/* ---- Service Worker ---- */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(function() {});
}
</script>
